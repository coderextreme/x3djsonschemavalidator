<!DOCTYPE html>
<html>
<head>
    <title>X3D JSON Schema Validator (planned)</title>
    <meta http-equiv="Content-Type" content="text/html;charset=utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
</head>
<body>
<button onclick="openAndFill(); console.log('got here'); return false;">Open and Fill</button>
</body>
    <script type="text/javascript" defer>
function openAndFill() {
  console.log("Opening");
  const win = window.open('https://coderextreme.net/x3djsonschemavalidator/schemavalidator.html',  'JsonSchemaValidator');
  window.addEventListener('message', (event) => {
    console.log("Adding event listener", event.origin);
    if (event.origin !== 'https://coderextreme.net') return;
    console.log("Origin checks", event.data);

    if (event.data === 'ready') {
      console.log("Posting");
      fetch("https://coderextreme.github.io.x3djsonschemavalidator/schemas/x3d-4.1-JSONSchema.json")
	.then(response => {
	      win.postMessage(
		      { textarea1: response.json(), textarea2: { "X3D": {}} },
		'https://coderextreme.net/'
	      );
      });
      console.log("Posted");
    }
    console.log("Done with event");
  });
  console.log("Done opening");
}
</script>
</html>
