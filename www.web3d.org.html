<!DOCTYPE html>
<html>
<head>
    <title>X3D JSON Schema Validator (planned)</title>
    <meta http-equiv="Content-Type" content="text/html;charset=utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
</head>
<body>
<script type="text/javascript">
function openAndFill(link) {
  	console.log("Opening");
	const win = window.open('https://coderextreme.net/x3djsonschemavalidator/schemavalidator.html',  'JsonSchemaValidator');
  window.addEventListener('message', (event) => {
    console.log("Adding event listener", event.origin);
    if (event.origin !== 'https://coderextreme.net') return;
    console.log("Origin checks", event.data);

    if (event.data === 'ready') {
      console.log("Posting");
      fetch("https://coderextreme.github.io/x3djsonschemavalidator/schemas/x3d-4.1-JSONSchema.json")
	.then(response => {
    	      return response.json();
        })
        .then(schema => {
      		fetch(link)
		.then(response => {
		      return response.json();
		})
		.then(data => {
			console.log(schema);
			win.postMessage( { textarea1: schema, textarea2: data } , 'https://coderextreme.net/');
			console.log("Posted");
		});
	});
    }
    console.log("Done with event");
  }, { once: true });
  console.log("Done opening");
}
</script>
<button onclick="openAndFill('CatByMuru.x3dj'); return false;">CatByMuru.x3dj</button>
<button onclick="openAndFill('HAnimPoseExample.x3dj'); return false;">HAnimPoseExample.x3dj</button>
<button onclick="openAndFill('HalloweenPumpkinLanternKnight.x3dj'); return false;">HalloweenPumpkinLanternKnight.x3dj</button>
<button onclick="openAndFill('SheenCloth.x3dj'); return false;">SheenCloth.x3dj</button>
</body>
</html>
