<!DOCTYPE html>
<html>
<head>
    <title>JSON Schema validator</title>
    <meta http-equiv="Content-Type" content="text/html;charset=utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<style>
textarea { width: 100%; height: 33%; }
</style>
</head>
<body>
	<textarea id="textarea1">
	</textarea>
	<textarea id="textarea2">
	</textarea>
	<textarea id="textarea3">
	</textarea>
	<script type="importmap">
		{
		  "imports": {
		    "@hyperjump/json-schema/": "https://esm.sh/@hyperjump/json-schema@1.12.1/",
		    "@hyperjump/browser/":     "https://esm.sh/@hyperjump/browser@1.0.3/"
		  }
		}
	</script>
    <script type="module" defer>
import selectObjectFromJson from './selectObjectFromJson.js';
import { registerSchema, validate } from "@hyperjump/json-schema/draft-2020-12";
import { BASIC } from "@hyperjump/json-schema/experimental";

export default async function validateJSON(json, schemaUri, schemajson) {
    registerSchema(schemajson, schemaUri);
    console.log("Schema 4.1 registered");
    await validate(schemaUri, json, BASIC)
	.then(response => {
		if (response.valid) {
			alert("Success validating JSON");
		} else {
			alert("Error invalid JSON ");
			let errors = [];
			for (let e in response.errors) {
				let error = response.errors[e];
				if (!error.keyword.endsWith("validate")) {
					errors.push("keyword:", error.keyword.substr(error.keyword.lastIndexOf("/")+1));
					////////////////////////////////////////////////////////
					let schemaPath = error.absoluteKeywordLocation.substr(error.absoluteKeywordLocation.lastIndexOf("#")+2).replaceAll("/", " > ");
					errors.push("schema location:", schemaPath);
					let schemaSelectedObject = selectObjectFromJson(schemajson, schemaPath);
					errors.push( "schema value:", JSON.stringify(schemaSelectedObject,
						function(k, v) {
						    let v2 = JSON.parse(JSON.stringify(v));
						    if (typeof v2 === 'object') {
							    for (let o in v2) {
								    /*
								if (typeof v2[o] === 'object') {
									    v2[o] = "|omitted|";
								}
								*/
							    }
						    }
						    return v2;
						}));

					////////////////////////////////////////////////////////
					let instancePath = error.instanceLocation.substr(error.instanceLocation.lastIndexOf("#")+2).replaceAll("/", " > ");
					errors.push("instance location:", instancePath)
					let instanceSelectedObject = selectObjectFromJson(json, instancePath);
					errors.push("instancd value:", JSON.stringify(instanceSelectedObject));
					errors.push( "instance shorthand value:", JSON.stringify(instanceSelectedObject,
						function(k, v) {
						    let v2 = JSON.parse(JSON.stringify(v));
						    if (typeof v2 === 'object') {
							    for (let o in v2) {
								if (typeof v2[o] === 'object') {
									    v2[o] = "|omitted|";
								}
							    }
						    }
						    return v2;
						}));
					errors.push("");
				}
			}
			document.querySelector("#textarea3").value = errors;
		}
	})
	.catch(error => {
		console.error("Error caught problem with JSON", error);
	});
}

export async function parseAndValidate() {
	let schemaUri = "https://coderextreme.github.io/x3djsonschemavalidator/schemas/x3d-4.1-JSONSchema.json";
	let schemajson = JSON.parse(document.querySelector("#textarea1").value);
	let json = JSON.parse(document.querySelector("#textarea2").value);
	validateJSON(json, schemaUri, schemajson);
}

window.name = "JsonSchemaValidator";
console.log("adding event listener");

window.addEventListener('message', (event) => {
  console.log("confirming origin");
  if (event.origin !== 'https://coderextreme.github.io') return;

  const { textarea1, textarea2 } = event.data;
  console.log("received data", textarea1, textarea2);
  const textareas = document.querySelectorAll('textarea');

  if (textarea1 && textareas[0]) {
    textareas[0].value = JSON.stringify(textarea1);
    console.log("dispatching1");
    textareas[0].dispatchEvent(new Event('input', { bubbles: true }));
    console.log("dispatched1");
  }

  if (textarea2 && textareas[1]) {
    textareas[1].value = JSON.stringify(textarea2);
    console.log("dispatching2");
    textareas[1].dispatchEvent(new Event('input', { bubbles: true }));
    console.log("dispatched2");
  }
  parseAndValidate();
}, { once: true });
console.log("done adding listeners");
window.addEventListener('load', (event) => {
	if (window.opener) {
		console.log("sending to opener");
		window.opener.postMessage('ready', 'https://coderextreme.github.io');
		console.log("done posting");
	}
}, { once: true });

    </script>
</body>
</html>
