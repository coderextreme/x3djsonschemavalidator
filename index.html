<!DOCTYPE html>
<html>
<head>
    <title>X3D JSON Schema Validator (planned)</title>
    <meta http-equiv="Content-Type" content="text/html;charset=utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <script type="text/javascript">
function openAndFill() {
  const win = window.open('https://coderextreme.net/X3DJSONLD/src/main/html/schemavalidator.html', '_blank');
  window.addEventListener('message', (event) => {
    if (event.origin !== 'https://coderextreme.net') return;

    if (event.data === 'ready') {
      win.postMessage(
        { textarea1: 'first content here', textarea2: 'second content here' },
        'https://www.coderextreme.net'
      );
    }
  });
}
</script>
</head>
<body>
<button onclick="openAndFill(); console.log('got here'); return false;">Open and Fill</button>
</body>
</html>
