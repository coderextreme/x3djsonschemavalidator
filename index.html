<!DOCTYPE html>
<html>
<head>
    <title>X3D JSON Schema Validator (planned)</title>
    <meta http-equiv="Content-Type" content="text/html;charset=utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <script type="text/javascript">
function openAndFill() {
  console.log("Opening");
  const win = window.open('https://coderextreme.net/x3djsonschemavalidator/schemavalidator.html', '_blank');
  window.addEventListener('message', (event) => {
    console.log("Adding event listener", event.origin);
    if (event.origin !== 'https://coderextreme.net') return;
    console.log("Origin checks", event.data);

    if (event.data === 'ready') {
      console.log("Posting");
      win.postMessage(
        { textarea1: 'first content here', textarea2: 'second content here' },
        'https://www.coderextreme.net/x3djsonschemavalidator/schemavalidator.html'
      );
      console.log("Posted");
    }
    console.log("Done with event");
  });
  console.log("Done opening");
}
</script>
</head>
<body>
<button onclick="openAndFill(); console.log('got here'); return false;">Open and Fill</button>
</body>
</html>
